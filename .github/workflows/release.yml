name: Build Portable EXE

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install PyInstaller PySide6 yt-dlp imageio-ffmpeg mutagen requests Pillow

      - name: Download FFmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg-release.zip"
          Expand-Archive -Path "ffmpeg-release.zip" -DestinationPath "ffmpeg_build"
          $ffmpegDir = Get-ChildItem -Path "ffmpeg_build" -Directory | Where-Object { $_.Name -like "ffmpeg-*-essentials_build" } | Select-Object -First 1
          Copy-Item -Path "$($ffmpegDir.FullName)\bin\ffmpeg.exe" -Destination "assets\ffmpeg.exe"
          Remove-Item -Path "ffmpeg-release.zip" -Force
          Remove-Item -Path "ffmpeg_build" -Recurse -Force

      - name: Build (one-directory)
        run: python build.py

      - name: Copy FFmpeg into build
        run: Copy-Item -Path "assets\ffmpeg.exe" -Destination "dist\TEX\ffmpeg.exe"

      - name: Create ZIP
        run: |
          Push-Location "dist\TEX"
          & 7z a -mx=9 "..\TEX-Portable.zip" *
          Pop-Location

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: TEX-Portable
          path: dist/TEX-Portable.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TEX-Portable.zip
          generate_release_notes: true